<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-tac-game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poiret+One&display=swap" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Poiret+One&display=swap"
        rel="stylesheet">

    <style>
        body {
            margin: 0px;
        }

        .bg {
            height: 100vh;
            background-image: url("src/img_bg.svg");
            background-repeat: no-repeat;
            background-size: cover;
            padding-left: 80px;

        }

        .h1 {
            color: #CF2926;
            text-align: center;
            -webkit-text-stroke-width: 1.27px;
            -webkit-text-stroke-color: #CF2926;
            font-family: "MADE Waffle Soft";
            font-size: 80px;
            font-style: normal;
            margin-top: 160px;
        }

        .text_main {
            color: #CF2926;
            text-align: center;
            font-family: Montserrat;
            font-size: 40px;
            font-style: normal;
        }

        .button {
            color: #FFF;
            text-align: center;
            font-family: Montserrat;
            font-size: 30px;
            font-style: normal;
            padding: 22px 52px 22px 50px;
            background-color: #CF2926;
            border: 1px solid #CF2926;
            border-radius: 40px;
        }

        .main {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            gap: 40px
        }

        .text_image {
            display: flex;
            flex-direction: row;
            gap: 20px;
            justify-content: center;
            align-items: center;
        }

        .button_text {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .image_main {
            width: 250px;
            height: 307px;
        }

        .switch input {
            display: none;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 34px;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #CDD1DA;
            border-radius: 34px;
            transition: 0.4s;
            border-radius: 100px;
            box-shadow: 0 4px 4px 0 rgba(0, 0, 0, 0.10) inset;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 26px;
            width: 26px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            border-radius: 50%;
            transition: 0.4s;
            filter: drop-shadow(0 1px 2px rgba(0, 0, 0, 0.10));
        }

        input:checked+.slider {
            background-color: #0fa31c;
        }

        input:checked+.slider:before {
            transform: translateX(26px);
        }

        .bg_block_2 {
            height: 100vh;
            background-image: url("src/img_bg_2.svg");
            background-repeat: no-repeat;
            background-size: cover;
        }

        .hidden {
            display: none;
        }

        .button_size {
            display: flex;
            flex-direction: column;
            gap: 20px;
            justify-content: space-between;
            align-items: center;
        }

        .button_size_block2 {
            color: #FFF;
            text-align: center;
            font-family: Montserrat;
            font-size: 30px;
            font-style: normal;
            padding: 22px 185px 22px 185px;
            background-color: #CF2926;
            border: 1px solid #CF2926;
            border-radius: 40px;
        }

        .bg_block_3 {
            min-height: 100vh;
            background-image: url("src/img_bg_3.svg");
            background-repeat: no-repeat;
            background-size: cover;
            padding-top: 120px;
        }

        .button_close {

            position: absolute;
            top: 20px;
            right: 20px;
            background: transparent;
            border: none;
            padding: 0;
            cursor: pointer;
        }

        table {
            border-collapse: collapse;
            /* removes double lines */
            margin: 20px auto;
            border-collapse: separate;
            /* disable border collapsing */
            border-spacing: 0;
            /* remove cell spacing */
            border-radius: 30px;
            /* border radius */
            overflow: hidden;

        }

        td {
            width: 100px;
            /* make cells square */
            height: 100px;
            border: 1px solid #CF2926;
            text-align: center;
            /* align text to center */
            font-size: 50px;
            /* X/O symbol size */
            cursor: pointer;
            /* set cursor on hover */
            background-color: #FFF;

        }

        .text_table {
            display: flex;
            flex-direction: column;
            gap: 20px;
            justify-content: center;
            align-items: center;

        }

        .hidden {
            display: none;
        }

        .flex-row-end {
            display: flex;
            flex-direction: row;
            justify-content: end;
        }

        .nullCell {
            background: url(src/zero.svg) center center no-repeat #FFF;
        }

        .cross {
            background: url(src/cross.svg) center center no-repeat #FFF;
        }

        .h1_winTable {
            color: #FFF;
            text-align: center;
            font-family: "MADE Waffle Soft";
            font-size: 40px;
        }

        .image {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
            justify-content: center;
            padding-bottom: 40px;
            padding-top: 40px;
        }


        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(149, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-overlay.is-open {
            display: flex;
        }

        .modal-content {
            background-color: #821614;
            border-radius: 8px;
            max-width: 500px;
            width: 100%;
            position: relative;
            padding: 40px;
        }
    </style>

</head>

<body>
    <div id="block_one" class="bg">
        <div class="main">
            <span class="h1">Крестики-Нолики</span>
            <div class="button_text">
                <div class="text_image">
                    <span class="text_main">На двоих</span>

                    <label class="switch">
                        <input id="checkbox" type="checkbox">
                        <span class="slider"></span>
                    </label>
                </div>

                <button id="main_button" class="button">Выбрать размер поля</button>

            </div>
        </div>
        <img class="image_main" src="src/image_main.svg">
    </div>

    <div id="size_game" class="bg_block_2 hidden">
        <div class="main">
            <span class="h1">Размер поля:</span>
            <div class="button_size">
                <button id="size_3" class="button_size_block2">3 X 3</button>
                <button id="size_4" class="button_size_block2">4 X 4</button>
                <button id="size_5" class="button_size_block2">5 X 5</button>
                <button id="size_6" class="button_size_block2">6 X 6</button>
                <button id="size_7" class="button_size_block2">7 X 7</button>
            </div>
        </div>
    </div>

    <div id="gameView" class="bg_block_3 hidden">
        <div id="button_cross" class="flex-row-end"><button class="button_close"><img
                    src="src/basil_cross-solid.svg"></button></div>

        <div class="text_table">
            <span class="text_main">Ваш ход:</span>
            <table id="table">
            </table>
        </div>

    </div>


    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <button id=endWindowGame class="button_close"><img src="src/crossWhite.svg"></button>
            <div class="image">
                <img src="src/fire.svg">
                <span class="h1_winTable"><strong>Победа крестиков!</strong></span>
            </div>
        </div>
    </div>


    <div class="modal-overlay" id="modal_two">
        <div class="modal-content">
            <button id=endWindowGame_two class="button_close"><img src="src/crossWhite.svg"></button>
            <div class="image">
                <img src="src/fire.svg">
                <span class="h1_winTable"><strong>Победа ноликов!</strong></span>
            </div>
        </div>
    </div>


    <script src="tic-tac.js"></script>
</body>
