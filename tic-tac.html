<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-tac-game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poiret+One&display=swap" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Poiret+One&display=swap"
        rel="stylesheet">

    <style>
        .bg {
            padding-top: 160px;
            background-image: url("src/img_bg.svg");
            background-repeat: no-repeat;
            background-size: cover;
            padding-left: 80px;

        }

        .h1 {
            color: #CF2926;
            text-align: center;
            -webkit-text-stroke-width: 1.27px;
            -webkit-text-stroke-color: #CF2926;
            font-family: "MADE Waffle Soft";
            font-size: 80px;
            font-style: normal;
        }

        .text_main {
            color: #CF2926;
            text-align: center;
            font-family: Montserrat;
            font-size: 40px;
            font-style: normal;
        }

        .button {
            color: #FFF;
            text-align: center;
            font-family: Montserrat;
            font-size: 30px;
            font-style: normal;
            padding: 22px 52px 22px 50px;
            background-color: #CF2926;
            border: 1px solid #CF2926;
            border-radius: 40px;
        }

        .main {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            gap: 40px
        }

        .text_image {
            display: flex;
            flex-direction: row;
            gap: 20px;
            justify-content: center;
            align-items: center;
        }

        .button_text {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .image_main {
            width: 250px;
            height: 307px;
        }

        .switch input {
            display: none;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 34px;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #CDD1DA;
            border-radius: 34px;
            transition: 0.4s;
            border-radius: 100px;
            box-shadow: 0 4px 4px 0 rgba(0, 0, 0, 0.10) inset;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 26px;
            width: 26px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            border-radius: 50%;
            transition: 0.4s;
            filter: drop-shadow(0 1px 2px rgba(0, 0, 0, 0.10));
        }

        input:checked+.slider {
            background-color: #0fa31c;
        }

        input:checked+.slider:before {
            transform: translateX(26px);
        }

        .bg_block_2 {
            padding-top: 160px;
            background-image: url("src/img_bg_2.svg");
            background-repeat: no-repeat;
            background-size: cover;
            padding-bottom: 100px;
        }

        .button_size {
            display: flex;
            flex-direction: column;
            gap: 20px;
            justify-content: space-between;
            align-items: center;
        }

        .button_size_block2 {
            color: #FFF;
            text-align: center;
            font-family: Montserrat;
            font-size: 30px;
            font-style: normal;
            padding: 22px 185px 22px 185px;
            background-color: #CF2926;
            border: 1px solid #CF2926;
            border-radius: 40px;
        }

        .bg_block_3 {
            padding-top: 160px;
            background-image: url("src/img_bg_3.svg");
            background-repeat: no-repeat;
            background-size: cover;
            padding-bottom: 100px;
        }

        .button_close {
            background-color: #FDCFCF;
            border: 1px solid #FDCFCF;
            display: flex;
            justify-content: flex-end;
            align-items: flex-end;
        }

        table {
            border-collapse: collapse;
            /* Убирает двойные линии */
            margin: 20px auto;
            border-collapse: separate;
            /* Отменяем слияние границ */
            border-spacing: 0;
            /* Убираем промежутки между ячейками */
            border-radius: 30px;
            /* Радиус скругления углов */
            overflow: hidden;

        }

        td {
            width: 100px;
            /* Делает клетки квадратными */
            height: 100px;
            border: 1px solid #CF2926;
            text-align: center;
            /* Выравнивает текст по центру */
            font-size: 50px;
            /* Размер крестика или нолика */
            cursor: pointer;
            /* Меняет курсор при наведении */
            background-color: #FFF;

        }

        .text_table {
            display: flex;
            flex-direction: column;
            gap: 20px;
            justify-content: center;
            align-items: center;
        }

        .hidden {
            display: none;
        }
    </style>

</head>

<body>
    <div class="bg">
        <div class="main">
            <span class="h1">Крестки-Нолики</span>
            <div class="button_text">
                <div class="text_image">
                    <span class="text_main">На двоих</span>

                    <label class="switch">
                        <input type="checkbox">
                        <span class="slider"></span>
                    </label>
                </div>
                <div>
                    <button class="button">Выбрать размер поля</button>
                </div>
            </div>
        </div>
        <img class="image_main" src="src/image_main.svg">
    </div>
    <div class="hidden">
        <div class="bg_block_2">
            <div class="main">
                <span class="h1">Размер поля:</span>
                <div class="button_size">
                    <button class="button_size_block2">3 X 3</button>
                    <button class="button_size_block2">4 X 4</button>
                    <button class="button_size_block2">5 X 5</button>
                    <button class="button_size_block2">6 X 6</button>
                    <button class="button_size_block2">7 X 7</button>
                </div>
            </div>
        </div>

        <div class="bg_block_3">
            <div class="text_image_table">
                <button class="button_close"><img src="src/basil_cross-solid.svg"></button>
                <div class="text_table">
                    <span class="text_main">Ваш ход:</span>
                    <table>
                        <tr>
                            <td></td>
                            <td></td>
                            <td></td>
                        </tr>
                        <tr>
                            <td></td>
                            <td></td>
                            <td></td>
                        </tr>
                        <tr>
                            <td></td>
                            <td></td>
                            <td></td>
                        </tr>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
